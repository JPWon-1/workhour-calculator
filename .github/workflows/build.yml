name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: WorkhourCalculator-windows.exe
          - os: macos-latest
            artifact: WorkhourCalculator-macos-arm64.zip
          - os: macos-13
            artifact: WorkhourCalculator-macos-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name WorkhourCalculator workhour_ui.py

      - name: Rename Windows artifact
        if: runner.os == 'Windows'
        run: mv dist/WorkhourCalculator.exe ${{ matrix.artifact }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name WorkhourCalculator workhour_ui.py

      - name: Package macOS .app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.artifact }} WorkhourCalculator.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
